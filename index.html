<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeCoding Prompt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter Tight', 'system-ui', 'sans-serif'],
          },
          colors: {
            monokai: {
              bg: '#272822',
              fg: '#F8F8F2',
              yellow: '#E6DB74',
              orange: '#FD971F',
              red: '#F92672',
              magenta: '#FD5FF0',
              blue: '#66D9EF',
              green: '#A6E22E',
              purple: '#AE81FF',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    /* Toast styles */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 1rem 1.5rem;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      transform: translateY(1rem);
      transition: all 0.3s ease;
      z-index: 50;
    }
    
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    .toast-icon {
      width: 1.25rem;
      height: 1.25rem;
      color: #22c55e;
    }
    
    .toast-content {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .toast-title {
      font-weight: 600;
      font-size: 0.875rem;
      color: #111827;
    }
    
    .toast-description {
      font-size: 0.875rem;
      color: #6b7280;
    }
    
    /* Tab styles */
    .tab-button {
      border-bottom-color: transparent;
      color: #6b7280;
    }
    
    .tab-button:hover {
      color: #111827;
    }
    
    .tab-button.active {
      border-bottom-color: #111827;
      color: #111827;
    }
  </style>
</head>
<body class="bg-white min-h-screen p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-6xl font-bold mb-4 text-black leading-tight">Generate prompts, <br>don't write</h1>
    <p class="text-xl text-gray-600 mb-8 max-w-2xl">Fill in the details, and the generator will create a standardized prompt for any vibecoding platform - in real time.</p>
    
    <!-- Tabs -->
    <div class="flex gap-2 mb-8 border-b border-gray-200">
      <button id="newAppTab" class="tab-button active px-6 py-3 font-semibold text-sm transition-colors border-b-2">
        New App
      </button>
      <button id="existingAppTab" class="tab-button px-6 py-3 font-semibold text-sm transition-colors border-b-2">
        Existing App
      </button>
    </div>
    
    <!-- New App Form -->
    <form id="newAppForm" class="tab-content space-y-6 bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Project Title</label>
        <input type="text" id="title" required 
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-900 placeholder-gray-400"
          placeholder="Company Market Cap Graph">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Description (one sentence)</label>
        <input type="text" id="description" required
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-900 placeholder-gray-400"
          placeholder="Interactive dependency graph showing company market caps">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Platform</label>
        <select id="platform" required
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-400">
          <option value="">Select platform...</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Additional instructions (optional)</label>
        <textarea id="instructions" rows="4"
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-900 placeholder-gray-400"
          placeholder="- Use react-force-graph for visualization&#10;- Integrate Alpha Vantage API&#10;- Add search/filter functionality"></textarea>
      </div>

      <button type="submit" 
        class="w-full bg-black text-white py-4 rounded-xl font-semibold hover:bg-gray-800 transition active:scale-[0.98]">
        Generate Prompt
      </button>
    </form>

    <!-- Existing App Form -->
    <form id="existingAppForm" class="tab-content hidden space-y-6 bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">
      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Project title</label>
        <input type="text" id="existingTitle" required 
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-900 placeholder-gray-400"
          placeholder="Company Market Cap Graph">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Description (one sentence)</label>
        <input type="text" id="existingDescription" required
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-900 placeholder-gray-400"
          placeholder="Interactive dependency graph showing company market caps">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Platform</label>
        <select id="existingPlatform" required
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-400">
          <option value="">Select platform...</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-gray-900">Additional Instructions (optional)</label>
        <textarea id="existingInstructions" rows="4"
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black focus:border-transparent text-gray-900 placeholder-gray-400"
          placeholder="- Use react-force-graph for visualization&#10;- Integrate Alpha Vantage API&#10;- Add search/filter functionality"></textarea>
      </div>

      <button type="submit" 
        class="w-full bg-black text-white py-4 rounded-xl font-semibold hover:bg-gray-800 transition active:scale-[0.98]">
        Generate Prompt
      </button>
    </form>

    <div id="output" class="hidden mt-12">
      <div class="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-black">Generated Prompt</h2>
          <button id="copyBtn" 
            class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800 transition active:scale-[0.98] font-semibold">
            Copy to Clipboard
          </button>
        </div>
        <pre id="promptOutput" class="bg-gray-50 p-6 rounded-xl overflow-x-auto text-sm text-gray-900 border border-gray-200"></pre>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
